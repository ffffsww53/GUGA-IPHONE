<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>GUGA IPHONES - Iphones, Perfumes e acessórios</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0c10; font-family: system-ui, -apple-system, sans-serif; color: #eef2ff; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; padding: 15px 20px; background: #11141c; border-bottom: 1px solid #222733; }
        .logo { font-size: 22px; font-weight: bold; }
        .logo span { color: #1e90ff; }
        .nav-cats { display: flex; gap: 8px; flex-wrap: wrap; }
        .cat-btn { background: transparent; border: 1px solid #334155; padding: 8px 18px; border-radius: 40px; color: #94a3b8; cursor: pointer; font-weight: 500; }
        .cat-btn.active { background: #1e90ff; border-color: #1e90ff; color: white; }
        .admin-btn { background: #1e293b; border: 1px solid #334155; padding: 8px 18px; border-radius: 40px; color: white; cursor: pointer; }
        .whatsapp-btn { background: #25D366; padding: 8px 18px; border-radius: 40px; text-decoration: none; color: black; font-weight: bold; display: inline-block; }
        
        /* Filtros */
        .filters { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 20px 0 20px; background: #11141c; padding: 16px; border-radius: 20px; }
        .filters input, .filters select { background: #1a1f2c; border: 1px solid #2a2f3c; color: white; padding: 10px 15px; border-radius: 12px; flex: 1; min-width: 130px; }
        .filter-clear { background: #1e293b; border: none; padding: 0 20px; border-radius: 40px; cursor: pointer; color: white; }
        
        /* Produtos Grid */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin: 20px; }
        .product-card { background: #11141c; border-radius: 20px; padding: 15px; border: 1px solid #222733; transition: 0.2s; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); border-color: #1e90ff; }
        .card-img { height: 160px; background: #0d0f15; border-radius: 16px; display: flex; align-items: center; justify-content: center; margin-bottom: 12px; font-size: 48px; overflow: hidden; }
        .card-img img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .card-detail { font-size: 13px; color: #94a3b8; margin-bottom: 8px; }
        .price-old { text-decoration: line-through; color: #888; font-size: 13px; }
        .price-current { font-size: 22px; font-weight: bold; color: #1e90ff; margin: 5px 0; }
        .payment-badge { display: flex; gap: 8px; margin: 10px 0; font-size: 11px; color: #94a3b8; }
        .installment { font-size: 12px; color: #94a3b8; margin: 5px 0; }
        .btn-buy { background: #25D366; color: black; font-weight: bold; border: none; width: 100%; padding: 10px; border-radius: 30px; cursor: pointer; margin-top: 8px; }
        
        /* Admin Panel */
        .admin-panel { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #0a0c10; z-index: 1000; overflow-y: auto; display: none; padding: 20px; }
        .admin-panel.open { display: block; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 25px; background: #11141c; padding: 15px 20px; border-radius: 20px; }
        .admin-tabs { display: flex; gap: 10px; flex-wrap: wrap; }
        .tab-btn { background: #1e293b; border: none; padding: 8px 20px; border-radius: 30px; color: white; cursor: pointer; }
        .tab-btn.active { background: #1e90ff; }
        .admin-section { display: none; }
        .admin-section.active { display: block; }
        .form-card { background: #11141c; border-radius: 20px; padding: 25px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: #94a3b8; }
        .form-group input, .form-group select { width: 100%; background: #1a1f2c; border: 1px solid #2a2f3c; color: white; padding: 10px 15px; border-radius: 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .products-list { display: flex; flex-direction: column; gap: 12px; }
        .product-row { background: #11141c; border-radius: 16px; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; border: 1px solid #222733; }
        .btn-edit { background: rgba(30,144,255,0.2); border: 1px solid rgba(30,144,255,0.3); color: #1e90ff; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .btn-del { background: rgba(255,69,69,0.2); border: 1px solid rgba(255,69,69,0.3); color: #ff4545; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .admin-save { background: #1e90ff; border: none; padding: 12px 24px; border-radius: 40px; color: white; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        /* Modal */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 2000; display: none; align-items: center; justify-content: center; }
        .modal-content { background: #11141c; border-radius: 24px; padding: 25px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1e90ff; color: white; padding: 10px 20px; border-radius: 40px; z-index: 1100; opacity: 0; transition: 0.2s; pointer-events: none; }
        .toast.show { opacity: 1; }
        
        @media (max-width: 640px) { .filters { flex-direction: column; } .form-row { grid-template-columns: 1fr; } .nav-cats { order: 3; width: 100%; justify-content: center; } }
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">GUGA <span>IPHONES</span></div>
    <div class="nav-cats">
        <button class="cat-btn active" onclick="switchCategory('iphones')">📱 iPhones</button>
        <button class="cat-btn" onclick="switchCategory('perfumes')">✨ Perfumes</button>
        <button class="cat-btn" onclick="switchCategory('eletronicos')">🎧 Acessórios & Eletrônicos</button>
    </div>
    <div style="display: flex; gap: 10px;">
        <button class="admin-btn" onclick="openAdminLogin()">⚙️ Admin</button>
        <a href="https://wa.me/5521967519632" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>
    </div>
</div>

<!-- FILTROS (dinâmicos) -->
<div id="filtersContainer" class="filters"></div>

<!-- PRODUTOS -->
<div id="productsGrid" class="products-grid"></div>

<!-- MODAL LOGIN -->
<div id="loginModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h3>🔐 Acesso Admin</h3><button class="modal-close" onclick="closeLoginModal()">✕</button></div>
        <input type="password" id="adminPassword" placeholder="Digite a senha" style="width:100%; background:#1a1f2c; border:1px solid #2a2f3c; color:white; padding:12px; border-radius:12px; margin-bottom:20px;">
        <button onclick="checkAdminLogin()" style="background:#1e90ff; border:none; padding:12px; width:100%; border-radius:30px; color:white; cursor:pointer;">Entrar</button>
    </div>
</div>

<!-- PAINEL ADMIN -->
<div id="adminPanel" class="admin-panel">
    <div class="admin-header">
        <div class="logo">⚙️ PAINEL <span>GUGA IPHONES</span></div>
        <div class="admin-tabs" id="adminTabs"></div>
        <button class="admin-btn" onclick="closeAdminPanel()">❌ Fechar</button>
    </div>
    <div id="adminSections"></div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ==================== CONFIGURAÇÕES (COLE SUAS CHAVES AQUI) ====================
    const JSONBIN_API_KEY = '$2a$10$eqsYzyzhWQRisqpMRtEJZetkhuMmcWwGXy6MWDneMK/pUvQf9gG4O';      // ← sua chave do JSONBin
    const IMGBB_API_KEY = '9bd992ebf86665062298438cc4bfe973';          // ← sua chave do ImgBB
    const IPHONES_BIN_ID = '69e7b84436566621a8d8e636';        // ← ID do bin de iPhones
    const PERFUMES_BIN_ID = '69e7b861856a6821895a36c3';      // ← ID do bin de Perfumes
    const ELETRONICOS_BIN_ID = '69e7b89caaba8821972265f2'; // ← ID do bin de Eletrônicos
    
    const ADMIN_PASS = 'batima2026';
    const WHATSAPP_NUMBER = '5521967519632';
    
    // ==================== DADOS ====================
    let currentCategory = 'iphones';
    let products = { iphones: [], perfumes: [], eletronicos: [] };
    
    // Dados padrão
    const defaultData = {
        iphones: [
            { id: '1', nome: 'iPhone 16 Pro Max', armazenamento: '256GB', preco: 9499, precoAntigo: 10999, condicao: 'Novo', cor: 'Titânio Natural', foto: '' },
            { id: '2', nome: 'iPhone 16 Pro', armazenamento: '128GB', preco: 7799, precoAntigo: 8999, condicao: 'Novo', cor: 'Titânio Preto', foto: '' },
            { id: '3', nome: 'iPhone 15 Pro', armazenamento: '256GB', preco: 6299, precoAntigo: 7499, condicao: 'Recondicionado', cor: 'Azul', foto: '' }
        ],
        perfumes: [
            { id: 'p1', nome: '212 Vip Black', marca: 'Carolina Herrera', genero: 'masculino', preco: 289, precoAntigo: 399, volume: '100ml', foto: '' },
            { id: 'p2', nome: 'Malbec', marca: 'Boticário', genero: 'masculino', preco: 159, precoAntigo: 229, volume: '100ml', foto: '' },
            { id: 'p3', nome: 'Luna', marca: 'Natura', genero: 'feminino', preco: 129, precoAntigo: 189, volume: '100ml', foto: '' }
        ],
        eletronicos: [
            { id: 'e1', nome: 'AirPods Pro 2', categoria: 'fones', marca: 'Apple', preco: 1899, precoAntigo: 2299, foto: '' },
            { id: 'e2', nome: 'Carregador USB-C 20W', categoria: 'carregadores', marca: 'Apple', preco: 149, precoAntigo: 199, foto: '' },
            { id: 'e3', nome: 'Capa Silicone MagSafe', categoria: 'capas', marca: 'Apple', preco: 129, precoAntigo: 199, foto: '' }
        ]
    };
    
    // ==================== FUNÇÕES DE BANCO ====================
    async function loadData() {
        const bins = { iphones: IPHONES_BIN_ID, perfumes: PERFUMES_BIN_ID, eletronicos: ELETRONICOS_BIN_ID };
        for (const [cat, binId] of Object.entries(bins)) {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${binId}/latest`, {
                    headers: { 'X-Master-Key': JSONBIN_API_KEY }
                });
                const data = await res.json();
                if (data.record && Array.isArray(data.record) && data.record.length) {
                    products[cat] = data.record;
                } else {
                    products[cat] = defaultData[cat];
                }
            } catch(e) { products[cat] = defaultData[cat]; }
        }
        renderCurrentCategory();
    }
    
    async function saveCategory(cat) {
        try {
            const binId = cat === 'iphones' ? IPHONES_BIN_ID : (cat === 'perfumes' ? PERFUMES_BIN_ID : ELETRONICOS_BIN_ID);
            await fetch(`https://api.jsonbin.io/v3/b/${binId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'X-Master-Key': JSONBIN_API_KEY },
                body: JSON.stringify(products[cat])
            });
            return true;
        } catch(e) { return false; }
    }
    
    // ==================== UPLOAD IMAGEM ====================
    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('image', file);
        formData.append('key', IMGBB_API_KEY);
        const res = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (data.success) return data.data.url;
        throw new Error('Falha no upload');
    }
    
    // ==================== RENDER LOJA ====================
    function formatPrice(v) { return `R$ ${v.toLocaleString('pt-BR')}`; }
    
    function getInstallment(price) { return `12x de ${formatPrice(price/12)}`; }
    
    function renderCurrentCategory() {
        const items = products[currentCategory];
        const grid = document.getElementById('productsGrid');
        const filtersDiv = document.getElementById('filtersContainer');
        
        // Filtros dinâmicos por categoria
        if (currentCategory === 'iphones') {
            filtersDiv.innerHTML = `
                <input type="text" id="searchInput" placeholder="🔍 Buscar iPhone..." onkeyup="filterProducts()">
                <select id="storageFilter" onchange="filterProducts()"><option value="">Todos</option><option value="128GB">128GB</option><option value="256GB">256GB</option><option value="512GB">512GB</option></select>
                <select id="priceFilter" onchange="filterProducts()"><option value="">Todos preços</option><option value="3000">Até R$3.000</option><option value="5000">Até R$5.000</option><option value="10000">Até R$10.000</option></select>
                <button class="filter-clear" onclick="clearFilters()">Limpar</button>
            `;
        } else if (currentCategory === 'perfumes') {
            filtersDiv.innerHTML = `
                <input type="text" id="searchInput" placeholder="🔍 Buscar perfume..." onkeyup="filterProducts()">
                <select id="genderFilter" onchange="filterProducts()"><option value="">Todos gêneros</option><option value="masculino">👨 Masculino</option><option value="feminino">👩 Feminino</option><option value="unissex">🔄 Unissex</option></select>
                <select id="priceFilter" onchange="filterProducts()"><option value="">Todos preços</option><option value="100">Até R$100</option><option value="200">Até R$200</option><option value="300">Até R$300</option></select>
                <button class="filter-clear" onclick="clearFilters()">Limpar</button>
            `;
        } else {
            filtersDiv.innerHTML = `
                <input type="text" id="searchInput" placeholder="🔍 Buscar produto..." onkeyup="filterProducts()">
                <select id="catFilter" onchange="filterProducts()"><option value="">Todas categorias</option><option value="fones">🎧 Fones</option><option value="carregadores">🔌 Carregadores</option><option value="capas">📱 Capas</option><option value="smartwatches">⌚ Smartwatches</option><option value="caixas-som">🔊 Caixas de Som</option></select>
                <select id="priceFilter" onchange="filterProducts()"><option value="">Todos preços</option><option value="200">Até R$200</option><option value="500">Até R$500</option><option value="1000">Até R$1.000</option></select>
                <button class="filter-clear" onclick="clearFilters()">Limpar</button>
            `;
        }
        
        filterProducts();
    }
    
    function filterProducts() {
        let items = [...products[currentCategory]];
        const search = document.getElementById('searchInput')?.value.toLowerCase() || '';
        
        if (currentCategory === 'iphones') {
            const storage = document.getElementById('storageFilter')?.value || '';
            const priceLimit = parseFloat(document.getElementById('priceFilter')?.value) || 0;
            items = items.filter(p => {
                if (search && !p.nome.toLowerCase().includes(search)) return false;
                if (storage && p.armazenamento !== storage) return false;
                if (priceLimit && p.preco > priceLimit) return false;
                return true;
            });
        } else if (currentCategory === 'perfumes') {
            const gender = document.getElementById('genderFilter')?.value || '';
            const priceLimit = parseFloat(document.getElementById('priceFilter')?.value) || 0;
            items = items.filter(p => {
                if (search && !p.nome.toLowerCase().includes(search)) return false;
                if (gender && p.genero !== gender) return false;
                if (priceLimit && p.preco > priceLimit) return false;
                return true;
            });
        } else {
            const catFilter = document.getElementById('catFilter')?.value || '';
            const priceLimit = parseFloat(document.getElementById('priceFilter')?.value) || 0;
            items = items.filter(p => {
                if (search && !p.nome.toLowerCase().includes(search)) return false;
                if (catFilter && p.categoria !== catFilter) return false;
                if (priceLimit && p.preco > priceLimit) return false;
                return true;
            });
        }
        
        const grid = document.getElementById('productsGrid');
        if (!items.length) { grid.innerHTML = '<div style="text-align:center; padding:50px;">Nenhum produto encontrado 🔍</div>'; return; }
        
        grid.innerHTML = items.map(p => {
            const save = p.precoAntigo ? p.precoAntigo - p.preco : 0;
            let detailHtml = '';
            if (currentCategory === 'iphones') detailHtml = `<div class="card-detail">${p.armazenamento} | ${p.condicao} | ${p.cor || ''}</div>`;
            else if (currentCategory === 'perfumes') detailHtml = `<div class="card-detail">${p.marca} | ${p.volume} | ${p.genero === 'masculino' ? '👨 Masculino' : (p.genero === 'feminino' ? '👩 Feminino' : '🔄 Unissex')}</div>`;
            else detailHtml = `<div class="card-detail">${p.marca} | ${p.categoria}</div>`;
            
            return `
                <div class="product-card">
                    <div class="card-img">${p.foto ? `<img src="${p.foto}">` : (currentCategory === 'iphones' ? '📱' : (currentCategory === 'perfumes' ? '🧴' : '🎧'))}</div>
                    <div class="card-title">${p.nome}</div>
                    ${detailHtml}
                    ${p.precoAntigo ? `<div class="price-old">${formatPrice(p.precoAntigo)}</div>` : ''}
                    <div class="price-current">${formatPrice(p.preco)}</div>
                    <div class="installment">📦 ${getInstallment(p.preco)} sem juros</div>
                    <div class="payment-badge"><span>💳 Cartão</span><span>📱 Pix (10% off)</span><span>📄 Boleto</span></div>
                    <button class="btn-buy" onclick="buyProduct('${p.id}')">💬 Comprar via WhatsApp</button>
                </div>
            `;
        }).join('');
    }
    
    function buyProduct(id) {
        const p = products[currentCategory].find(x => x.id === id);
        if (!p) return;
        let msg = `Olá! Tenho interesse no produto: ${p.nome}`;
        if (currentCategory === 'iphones') msg += ` - ${p.armazenamento}`;
        msg += `\nPreço: ${formatPrice(p.preco)}\nVi pelo site GUGA IPHONES.`;
        window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    }
    
    function clearFilters() {
        document.getElementById('searchInput').value = '';
        if (currentCategory === 'iphones') document.getElementById('storageFilter').value = '';
        if (currentCategory === 'perfumes') document.getElementById('genderFilter').value = '';
        if (currentCategory === 'eletronicos') document.getElementById('catFilter').value = '';
        document.getElementById('priceFilter').value = '';
        filterProducts();
    }
    
    function switchCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderCurrentCategory();
    }
    
    // ==================== ADMIN ====================
    let editingItem = null;
    let editingCategory = null;
    
    function openAdminLogin() { document.getElementById('loginModal').style.display = 'flex'; }
    function closeLoginModal() { document.getElementById('loginModal').style.display = 'none'; }
    
    function checkAdminLogin() {
        const pass = document.getElementById('adminPassword').value;
        if (pass === ADMIN_PASS) { closeLoginModal(); openAdminPanel(); }
        else { showToast('Senha incorreta!', 'error'); }
    }
    
    function openAdminPanel() {
        document.getElementById('adminPanel').classList.add('open');
        renderAdminPanel();
    }
    
    function closeAdminPanel() { document.getElementById('adminPanel').classList.remove('open'); editingItem = null; }
    
    function renderAdminPanel() {
        const tabsDiv = document.getElementById('adminTabs');
        const sectionsDiv = document.getElementById('adminSections');
        const categories = ['iphones', 'perfumes', 'eletronicos'];
        const names = { iphones: '📱 iPhones', perfumes: '✨ Perfumes', eletronicos: '🎧 Acessórios' };
        
        tabsDiv.innerHTML = categories.map((cat, i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchAdminTab('${cat}')">${names[cat]}</button>`).join('');
        
        sectionsDiv.innerHTML = categories.map(cat => `
            <div id="tab-${cat}" class="admin-section ${cat === 'iphones' ? 'active' : ''}">
                <div class="form-card">
                    <h3 style="margin-bottom:20px;">➕ Adicionar ${names[cat]}</h3>
                    <div id="form-${cat}"></div>
                    <button class="admin-save" onclick="saveProduct('${cat}')">💾 SALVAR PRODUTO</button>
                </div>
                <div class="form-card">
                    <h3 style="margin-bottom:20px;">📋 Gerenciar ${names[cat]}</h3>
                    <div id="list-${cat}" class="products-list"></div>
                </div>
            </div>
        `).join('');
        
        categories.forEach(cat => {
            renderAdminForm(cat);
            renderAdminList(cat);
        });
    }
    
    function renderAdminForm(cat) {
        const container = document.getElementById(`form-${cat}`);
        if (cat === 'iphones') {
            container.innerHTML = `
                <div class="form-group"><label>Modelo *</label><input type="text" id="edit_nome" placeholder="Ex: iPhone 15 Pro Max"></div>
                <div class="form-row"><div class="form-group"><label>Armazenamento</label><select id="edit_armazenamento"><option>128GB</option><option>256GB</option><option>512GB</option></select></div>
                <div class="form-group"><label>Preço *</label><input type="number" id="edit_preco" placeholder="6299"></div></div>
                <div class="form-row"><div class="form-group"><label>Preço Antigo</label><input type="number" id="edit_precoAntigo" placeholder="7499"></div>
                <div class="form-group"><label>Condição</label><select id="edit_condicao"><option>Novo</option><option>Recondicionado</option><option>Usado</option></select></div></div>
                <div class="form-row"><div class="form-group"><label>Cor</label><input type="text" id="edit_cor" placeholder="Titânio Natural"></div>
                <div class="form-group"><label>Foto URL</label><input type="text" id="edit_foto" placeholder="https://..."><input type="file" accept="image/*" onchange="uploadPhoto(this, 'edit_foto')" style="margin-top:8px;"></div></div>
            `;
        } else if (cat === 'perfumes') {
            container.innerHTML = `
                <div class="form-group"><label>Nome *</label><input type="text" id="edit_nome" placeholder="Ex: 212 Vip Black"></div>
                <div class="form-row"><div class="form-group"><label>Marca</label><input type="text" id="edit_marca" placeholder="Carolina Herrera"></div>
                <div class="form-group"><label>Preço *</label><input type="number" id="edit_preco" placeholder="289"></div></div>
                <div class="form-row"><div class="form-group"><label>Preço Antigo</label><input type="number" id="edit_precoAntigo" placeholder="399"></div>
                <div class="form-group"><label>Gênero</label><select id="edit_genero"><option value="masculino">👨 Masculino</option><option value="feminino">👩 Feminino</option><option value="unissex">🔄 Unissex</option></select></div></div>
                <div class="form-row"><div class="form-group"><label>Volume</label><input type="text" id="edit_volume" placeholder="100ml"></div>
                <div class="form-group"><label>Foto URL</label><input type="text" id="edit_foto" placeholder="https://..."><input type="file" accept="image/*" onchange="uploadPhoto(this, 'edit_foto')" style="margin-top:8px;"></div></div>
            `;
        } else {
            container.innerHTML = `
                <div class="form-group"><label>Nome *</label><input type="text" id="edit_nome" placeholder="Ex: AirPods Pro 2"></div>
                <div class="form-row"><div class="form-group"><label>Categoria</label><select id="edit_categoria"><option value="fones">🎧 Fones</option><option value="carregadores">🔌 Carregadores</option><option value="capas">📱 Capas</option><option value="smartwatches">⌚ Smartwatches</option><option value="caixas-som">🔊 Caixas de Som</option></select></div>
                <div class="form-group"><label>Marca</label><input type="text" id="edit_marca" placeholder="Apple"></div></div>
                <div class="form-row"><div class="form-group"><label>Preço *</label><input type="number" id="edit_preco" placeholder="1899"></div>
                <div class="form-group"><label>Preço Antigo</label><input type="number" id="edit_precoAntigo" placeholder="2299"></div></div>
                <div class="form-group"><label>Foto URL</label><input type="text" id="edit_foto" placeholder="https://..."><input type="file" accept="image/*" onchange="uploadPhoto(this, 'edit_foto')" style="margin-top:8px;"></div>
            `;
        }
    }
    
    function renderAdminList(cat) {
        const container = document.getElementById(`list-${cat}`);
        const items = products[cat];
        if (!items.length) { container.innerHTML = '<div style="padding:20px; text-align:center;">Nenhum produto cadastrado</div>'; return; }
        container.innerHTML = items.map(p => `
            <div class="product-row">
                <div><strong>${p.nome}</strong><br><span style="font-size:12px; color:#94a3b8;">${cat === 'iphones' ? p.armazenamento : (cat === 'perfumes' ? p.marca : p.categoria)} | ${formatPrice(p.preco)}</span></div>
                <div style="display:flex; gap:8px;"><button class="btn-edit" onclick="editProduct('${cat}', '${p.id}')">✏️ Editar</button><button class="btn-del" onclick="deleteProduct('${cat}', '${p.id}')">🗑️ Excluir</button></div>
            </div>
        `).join('');
    }
    
    function switchAdminTab(cat) {
        document.querySelectorAll('.admin-section').forEach(s => s.classList.remove('active'));
        document.getElementById(`tab-${cat}`).classList.add('active');
        document.querySelectorAll('.tab-btn').forEach((btn, i) => btn.classList.toggle('active', i === ['iphones','perfumes','eletronicos'].indexOf(cat)));
        editingItem = null;
        editingCategory = null;
        renderAdminForm(cat);
    }
    
    function editProduct(cat, id) {
        const p = products[cat].find(x => x.id === id);
        if (!p) return;
        editingItem = p;
        editingCategory = cat;
        switchAdminTab(cat);
        setTimeout(() => {
            document.getElementById('edit_nome').value = p.nome || '';
            document.getElementById('edit_preco').value = p.preco || '';
            document.getElementById('edit_precoAntigo').value = p.precoAntigo || '';
            if (cat === 'iphones') {
                document.getElementById('edit_armazenamento').value = p.armazenamento || '128GB';
                document.getElementById('edit_condicao').value = p.condicao || 'Novo';
                document.getElementById('edit_cor').value = p.cor || '';
                document.getElementById('edit_foto').value = p.foto || '';
            } else if (cat === 'perfumes') {
                document.getElementById('edit_marca').value = p.marca || '';
                document.getElementById('edit_genero').value = p.genero || 'masculino';
                document.getElementById('edit_volume').value = p.volume || '100ml';
                document.getElementById('edit_foto').value = p.foto || '';
            } else {
                document.getElementById('edit_categoria').value = p.categoria || 'fones';
                document.getElementById('edit_marca').value = p.marca || '';
                document.getElementById('edit_foto').value = p.foto || '';
            }
        }, 50);
    }
    
    async function deleteProduct(cat, id) {
        if (!confirm('Excluir este produto?')) return;
        products[cat] = products[cat].filter(p => p.id !== id);
        await saveCategory(cat);
        renderAdminList(cat);
        if (currentCategory === cat) renderCurrentCategory();
        showToast('Produto excluído!');
    }
    
    async function saveProduct(cat) {
        const nome = document.getElementById('edit_nome')?.value.trim();
        const preco = parseFloat(document.getElementById('edit_preco')?.value);
        if (!nome || isNaN(preco)) { showToast('Preencha nome e preço!', 'error'); return; }
        
        const newProduct = { id: editingItem?.id || Date.now().toString(), nome, preco, precoAntigo: parseFloat(document.getElementById('edit_precoAntigo')?.value) || null, foto: document.getElementById('edit_foto')?.value || '' };
        
        if (cat === 'iphones') {
            newProduct.armazenamento = document.getElementById('edit_armazenamento')?.value;
            newProduct.condicao = document.getElementById('edit_condicao')?.value;
            newProduct.cor = document.getElementById('edit_cor')?.value;
        } else if (cat === 'perfumes') {
            newProduct.marca = document.getElementById('edit_marca')?.value;
            newProduct.genero = document.getElementById('edit_genero')?.value;
            newProduct.volume = document.getElementById('edit_volume')?.value || '100ml';
        } else {
            newProduct.categoria = document.getElementById('edit_categoria')?.value;
            newProduct.marca = document.getElementById('edit_marca')?.value;
        }
        
        if (editingItem && editingCategory === cat) {
            const index = products[cat].findIndex(p => p.id === editingItem.id);
            if (index !== -1) products[cat][index] = newProduct;
            showToast('Produto atualizado!');
            editingItem = null;
            editingCategory = null;
        } else {
            products[cat].push(newProduct);
            showToast('Produto adicionado!');
        }
        
        await saveCategory(cat);
        renderAdminList(cat);
        if (currentCategory === cat) renderCurrentCategory();
        renderAdminForm(cat);
    }
    
    async function uploadPhoto(input, targetId) {
        if (!input.files.length) return;
        showToast('Enviando foto...');
        try {
            const url = await uploadToImgBB(input.files[0]);
            document.getElementById(targetId).value = url;
            showToast('Foto enviada!');
        } catch(e) { showToast('Erro no upload', 'error'); }
    }
    
    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }
    
    // ==================== INICIAR ====================
    window.switchCategory = switchCategory;
    window.switchAdminTab = switchAdminTab;
    window.editProduct = editProduct;
    window.deleteProduct = deleteProduct;
    window.saveProduct = saveProduct;
    window.uploadPhoto = uploadPhoto;
    window.filterProducts = filterProducts;
    window.clearFilters = clearFilters;
    window.buyProduct = buyProduct;
    window.openAdminLogin = openAdminLogin;
    window.closeLoginModal = closeLoginModal;
    window.checkAdminCheck = checkAdminLogin;
    window.closeAdminPanel = closeAdminPanel;
    
    loadData();
</script>
</body>
</html>
